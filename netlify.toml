[build]
  command = "npm install && cd server && npm install && cd ../client && npm install && npx vite build"
  publish = "client/dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "nft"
  included_files = ["server/**"]
  external_node_modules = ["better-sqlite3"]

[functions.api-proxy]
  included_files = ["server/**"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api-proxy/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
