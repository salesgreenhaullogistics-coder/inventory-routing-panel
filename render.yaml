services:
  - type: web
    name: anveshan-inventory-panel
    runtime: node
    plan: free
    buildCommand: cd server && npm install && cd ../client && npm install && npm run build
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: EASYECOM_API_BASE
        sync: false
      - key: EASYECOM_EMAIL
        sync: false
      - key: EASYECOM_PASSWORD
        sync: false
      - key: EASYECOM_API_KEY
        sync: false
      - key: EASYECOM_LOCATION_KEY
        sync: false
